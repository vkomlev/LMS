# Nginx site config для api.learn.victor-komlev.ru
# Установить в /etc/nginx/sites-available/lms.conf, включить симлинком в sites-enabled.

server {
    listen 80;
    listen [::]:80;
    server_name api.learn.victor-komlev.ru;

    # ACME-challenge для certbot (первичный выпуск сертификата)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.learn.victor-komlev.ru;

    ssl_certificate     /etc/letsencrypt/live/api.learn.victor-komlev.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.learn.victor-komlev.ru/privkey.pem;

    # tsk-159 (Codex-ревью): базовые security-заголовки
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
